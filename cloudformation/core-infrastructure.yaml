AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Connect Enterprise Security Architecture - Core Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'production'
    Description: Environment name for resource naming
    
  ConnectInstanceAlias:
    Type: String
    Default: 'enterprise-security-connect'
    Description: Amazon Connect instance alias
    
  VPCCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for VPC
    
  PrivateSubnetACidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: CIDR block for private subnet A
    
  PrivateSubnetBCidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: CIDR block for private subnet B
    
  PublicSubnetACidr:
    Type: String
    Default: '10.0.101.0/24'
    Description: CIDR block for public subnet A
    
  PublicSubnetBCidr:
    Type: String
    Default: '10.0.102.0/24'
    Description: CIDR block for public subnet B

Resources:
  # =====================
  # VPC and Networking
  # =====================
  
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-connect-vpc'
        - Key: Environment
          Value: !Ref EnvironmentName
  
  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw'
          
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC
  
  # Public Subnets
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetACidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-subnet-a'
          
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnetBCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-subnet-b'
  
  # Private Subnets
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetACidr
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-subnet-a'
          
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetBCidr
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-subnet-b'
  
  # NAT Gateways
  NatGatewayAEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-gateway-a-eip'
          
  NatGatewayBEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-gateway-b-eip'
  
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayAEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-gateway-a'
          
  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayBEIP.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-nat-gateway-b'
  
  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-routes'
          
  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  
  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA
      
  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB
  
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-routes-a'
          
  DefaultPrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA
      
  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      SubnetId: !Ref PrivateSubnetA
  
  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-routes-b'
          
  DefaultPrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB
      
  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      SubnetId: !Ref PrivateSubnetB

  # =====================
  # Security Groups
  # =====================
  
  ConnectSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-connect-sg'
      GroupDescription: Security group for Amazon Connect resources
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-connect-sg'
          
  IoTDeviceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-iot-devices-sg'
      GroupDescription: Security group for IoT devices
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8883
          ToPort: 8883
          CidrIp: 10.0.0.0/16
          Description: MQTTS from VPC
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
          Description: HTTPS from VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to AWS services
        - IpProtocol: tcp
          FromPort: 8883
          ToPort: 8883
          CidrIp: 0.0.0.0/0
          Description: MQTTS to AWS IoT
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-iot-devices-sg'

  # =====================
  # VPC Endpoints
  # =====================
  
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
  
  DynamoDBVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
  
  ConnectVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.connect'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref ConnectSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - connect:*
            Resource: '*'
  
  IoTDataVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.iot.data'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref IoTDeviceSecurityGroup
      PrivateDnsEnabled: true
  
  IoTCredentialsVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.iot.credentials'
      VpcEndpointType: Interface
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref IoTDeviceSecurityGroup
      PrivateDnsEnabled: true

  # =====================
  # KMS Keys
  # =====================
  
  ConnectKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Amazon Connect encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Connect Service
            Effect: Allow
            Principal:
              Service: connect.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-connect-kms-key'
  
  ConnectKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-connect-encryption'
      TargetKeyId: !Ref ConnectKMSKey
  
  DeviceKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for device data encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow IoT Service
            Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-device-kms-key'
  
  DeviceKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-device-encryption'
      TargetKeyId: !Ref DeviceKMSKey

  # =====================
  # DynamoDB Tables
  # =====================
  
  DeviceRegistryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-device-registry'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref DeviceKMSKey
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: device_type
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: customer-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: device-type-index
          KeySchema:
            - AttributeName: device_type
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-device-registry'
        - Key: Environment
          Value: !Ref EnvironmentName
  
  CustomerProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-customer-profiles'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref DeviceKMSKey
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: company_name
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: company-name-index
          KeySchema:
            - AttributeName: company_name
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-customer-profiles'
        - Key: Environment
          Value: !Ref EnvironmentName
  
  SecurityIncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-security-incidents'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref DeviceKMSKey
      AttributeDefinitions:
        - AttributeName: incident_id
          AttributeType: S
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: severity
          AttributeType: S
      KeySchema:
        - AttributeName: incident_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: device-timestamp-index
          KeySchema:
            - AttributeName: device_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: severity-timestamp-index
          KeySchema:
            - AttributeName: severity
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-security-incidents'
        - Key: Environment
          Value: !Ref EnvironmentName

  # =====================
  # S3 Buckets
  # =====================
  
  CallRecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-connect-call-recordings-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref ConnectKMSKey
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: CallRecordingLifecycle
            Status: Enabled
            ExpirationInDays: 2555  # 7 years
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
              - TransitionInDays: 365
                StorageClass: DEEP_ARCHIVE
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-call-recordings'
        - Key: Environment
          Value: !Ref EnvironmentName
  
  DeviceTelemetryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-device-telemetry-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref DeviceKMSKey
      IntelligentTieringConfigurations:
        - Id: IntelligentTiering
          Status: Enabled
          Prefix: telemetry/
      LifecycleConfiguration:
        Rules:
          - Id: TelemetryLifecycle
            Status: Enabled
            ExpirationInDays: 730  # 2 years
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-device-telemetry'
        - Key: Environment
          Value: !Ref EnvironmentName

# =====================
# Outputs
# =====================

Outputs:
  VPCId:
    Description: ID of the VPC
    Value: !Ref VPC
    Export:
      Name: !Sub '${EnvironmentName}-vpc-id'
      
  PrivateSubnetAId:
    Description: ID of private subnet A
    Value: !Ref PrivateSubnetA
    Export:
      Name: !Sub '${EnvironmentName}-private-subnet-a-id'
      
  PrivateSubnetBId:
    Description: ID of private subnet B
    Value: !Ref PrivateSubnetB
    Export:
      Name: !Sub '${EnvironmentName}-private-subnet-b-id'
      
  ConnectSecurityGroupId:
    Description: ID of Connect security group
    Value: !Ref ConnectSecurityGroup
    Export:
      Name: !Sub '${EnvironmentName}-connect-sg-id'
      
  IoTDeviceSecurityGroupId:
    Description: ID of IoT device security group
    Value: !Ref IoTDeviceSecurityGroup
    Export:
      Name: !Sub '${EnvironmentName}-iot-devices-sg-id'
      
  ConnectKMSKeyId:
    Description: ID of Connect KMS key
    Value: !Ref ConnectKMSKey
    Export:
      Name: !Sub '${EnvironmentName}-connect-kms-key-id'
      
  DeviceKMSKeyId:
    Description: ID of device KMS key
    Value: !Ref DeviceKMSKey
    Export:
      Name: !Sub '${EnvironmentName}-device-kms-key-id'
      
  DeviceRegistryTableName:
    Description: Name of device registry table
    Value: !Ref DeviceRegistryTable
    Export:
      Name: !Sub '${EnvironmentName}-device-registry-table-name'
      
  CustomerProfilesTableName:
    Description: Name of customer profiles table
    Value: !Ref CustomerProfilesTable
    Export:
      Name: !Sub '${EnvironmentName}-customer-profiles-table-name'
      
  SecurityIncidentsTableName:
    Description: Name of security incidents table
    Value: !Ref SecurityIncidentsTable
    Export:
      Name: !Sub '${EnvironmentName}-security-incidents-table-name'
      
  CallRecordingsBucketName:
    Description: Name of call recordings bucket
    Value: !Ref CallRecordingsBucket
    Export:
      Name: !Sub '${EnvironmentName}-call-recordings-bucket-name'
      
  DeviceTelemetryBucketName:
    Description: Name of device telemetry bucket
    Value: !Ref DeviceTelemetryBucket
    Export:
      Name: !Sub '${EnvironmentName}-device-telemetry-bucket-name'